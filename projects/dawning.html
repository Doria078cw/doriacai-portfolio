<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dawning — Project</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
  /* Full-viewport vertical scroll gallery */
  :root{--bg:#0b0b0c;--muted:rgba(255,255,255,0.7);--topbar-space:44px}
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;overflow-x:hidden}
   /* container becomes the scroll viewport with snap
     Override global .container (max-width/padding) so this page is full-bleed */
  /* use auto scrolling and reserve topbar space so images can fit fully */
  main.container{height:100vh;overflow-y:auto;overflow-x:hidden;scroll-snap-type:y mandatory;scroll-behavior:smooth;scroll-padding:0;-webkit-overflow-scrolling:touch;max-width:none;width:100%;padding:0;margin:0}
  /* each slide is slightly shorter than the viewport so the topbar doesn't overlap the image */
  .slide{height:calc(100vh - var(--topbar-space));scroll-snap-align:start;display:block;position:relative;margin:0;padding:0}
  /* anchor fills the slide and the image fits within the reduced height to avoid clipping */
  .slide > a{display:block;width:100%;height:100%}
  .slide img{width:100%;height:100%;object-fit:contain;border-radius:0;box-shadow:none;background:var(--bg);display:block;margin:0}
  /* top-left back link + title grouped together */
  .topbar{position:fixed;left:12px;top:8px;z-index:40;display:flex;align-items:center;gap:12px;padding:6px}
  .topbar a{color:var(--muted);text-decoration:none;padding:6px 8px;background:rgba(255,255,255,0.04);border-radius:6px}
  /* hide the site brand on this page to avoid overlap with the back button */
  nav.nav .brand{display:none}
  /* hide the right-side nav links to keep the header clean on this immersive page */
  nav.nav .nav-links{display:none}
  /* project title sits inline in the topbar (no absolute positioning) */
  .project-title{position:static;font-family:'Poppins',system-ui,Helvetica,Arial;color:#fff;font-weight:300;letter-spacing:0.4px;font-size:clamp(16px,3.2vw,36px);text-transform:none;white-space:nowrap}
    /* captions (optional) */
    .caption{position:absolute;left:50%;transform:translateX(-50%);bottom:28px;color:var(--muted);font-size:14px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:6px}
    /* remove default nav flow so slides start at very top */
    nav.nav{position:fixed;left:0;right:0;top:0;display:flex;justify-content:space-between;padding:12px 18px;z-index:15;background:transparent}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand">Doria Cai</div>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../about.html">About</a>
    </div>
  </nav>

  <main class="container">
    <div class="topbar">
      <a href="../index.html">← Back</a>
  <div class="project-title">Dawning</div>
    </div>

    <!-- Slide 1 -->
    <section class="slide">
      <a href="../assets/images/dawning/A4 - 3.png" target="_blank">
        <img src="../assets/images/dawning/A4 - 3.png" alt="Dawning 1" />
      </a>
    </section>

    <!-- Slide 2 -->
    <section class="slide">
      <a href="../assets/images/dawning/A4 - 4.png" target="_blank">
        <img src="../assets/images/dawning/A4 - 4.png" alt="Dawning 2" />
      </a>
    </section>

    <!-- Slide 3 -->
    <section class="slide">
      <a href="../assets/images/dawning/A4 - 5.png" target="_blank">
        <img src="../assets/images/dawning/A4 - 5.png" alt="Dawning 3" />
      </a>
    </section>
  </main>
</body>
</html>
