<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bytedance — Project</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
  :root{--bg:#0b0b0c;--muted:rgba(255,255,255,0.7);--topbar-space:44px}
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;overflow-x:hidden}
  main.container{height:100vh;overflow-y:auto;overflow-x:hidden;scroll-snap-type:y mandatory;scroll-behavior:smooth;scroll-padding:0;-webkit-overflow-scrolling:touch;max-width:none;width:100%;padding:0;margin:0}
  .slide{height:calc(100vh - var(--topbar-space));scroll-snap-align:start;display:block;position:relative;margin:0;padding:0}
  .slide > a{display:block;width:100%;height:100%}
  .slide img{width:100%;height:100%;object-fit:contain;background:var(--bg);display:block}
  .topbar{position:fixed;left:12px;top:8px;z-index:40;display:flex;align-items:center;gap:12px;padding:6px}
  .topbar a{color:var(--muted);text-decoration:none;padding:6px 8px;background:rgba(255,255,255,0.04);border-radius:6px}
  nav.nav .brand{display:none}
  nav.nav .nav-links{display:none}
  .project-title{font-family:'Poppins',system-ui,Helvetica,Arial;color:#fff;font-weight:300;font-size:clamp(16px,3.2vw,36px);white-space:nowrap}
  nav.nav{position:fixed;left:0;right:0;top:0;display:flex;justify-content:space-between;padding:12px 18px;z-index:15;background:transparent}
  .placeholder{height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand">Doria Cai</div>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../about.html">About</a>
    </div>
  </nav>

  <main class="container">
    <div class="topbar">
      <a href="../index.html">← Back</a>
      <div class="project-title">Bytedance</div>
    </div>

    <section class="slide">
      <div class="placeholder">No project images added yet.</div>
    </section>
  </main>
</body>
</html>
